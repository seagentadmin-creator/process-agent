name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - name: Package
        run: zip -r process-agent-${{ github.ref_name }}.zip src/ docs/ installer/ package.json tsconfig.json webpack.config.js jest.config.js -x "node_modules/*"
      - uses: softprops/action-gh-release@v1
        with:
          files: process-agent-${{ github.ref_name }}.zip
          generate_release_notes: true
